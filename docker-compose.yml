# Local dev services for Spanly: Postgres, Redis, MinIO (S3-compatible).
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: spanly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spanly
      POSTGRES_PASSWORD: spanly
      POSTGRES_DB: spanly
    ports:
      - "5432:5432"
    volumes:
      - spanly_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spanly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spanly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - spanly_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: spanly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - spanly_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the media bucket on startup, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo waiting for minio; sleep 2; done;
      mc mb --ignore-existing local/spanly-media;
      mc anonymous set download local/spanly-media;
      echo 'bucket ready';
      "

volumes:
  spanly_pg:
  spanly_redis:
  spanly_minio:
